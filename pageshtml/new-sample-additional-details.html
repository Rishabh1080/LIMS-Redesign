<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Sample Additional Details Reference</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./reference.css" />
  </head>
  <body>
    <div class="reference-banner">
      <h1 class="reference-banner__title">New Sample: Additional Details</h1>
      <a class="reference-banner__back" href="./index.html">Back to index</a>
    </div>

    <div class="new-sample-page">
      <main class="new-sample-page__content">
        <section class="new-sample-card">
          <div class="new-sample-card__body">
            <aside class="new-sample-rail">
              <div class="new-sample-rail__heading"><h1 class="new-sample-rail__title">New Sample</h1></div>
              <ol class="smplfy-stepper">
                <li class="smplfy-stepper-item smplfy-stepper-item--completed smplfy-stepper-item--first"><span class="smplfy-stepper-item__connector smplfy-stepper-item__connector--after"></span><span class="smplfy-stepper-item__indicator"></span><span class="smplfy-stepper-item__label">Customer Details</span></li>
                <li class="smplfy-stepper-item smplfy-stepper-item--completed smplfy-stepper-item--middle"><span class="smplfy-stepper-item__connector smplfy-stepper-item__connector--before"></span><span class="smplfy-stepper-item__connector smplfy-stepper-item__connector--after"></span><span class="smplfy-stepper-item__indicator"></span><span class="smplfy-stepper-item__label">Basic Details</span></li>
                <li class="smplfy-stepper-item smplfy-stepper-item--completed smplfy-stepper-item--middle"><span class="smplfy-stepper-item__connector smplfy-stepper-item__connector--before"></span><span class="smplfy-stepper-item__connector smplfy-stepper-item__connector--after"></span><span class="smplfy-stepper-item__indicator"></span><span class="smplfy-stepper-item__label">Product Details</span></li>
                <li class="smplfy-stepper-item smplfy-stepper-item--active smplfy-stepper-item--last"><span class="smplfy-stepper-item__connector smplfy-stepper-item__connector--before"></span><span class="smplfy-stepper-item__indicator"></span><span class="smplfy-stepper-item__label">Additional Details</span></li>
              </ol>
            </aside>

            <div class="new-sample-form">
              <div class="new-sample-form__stage">
                <div class="container-fluid new-sample-form__content">
                  <div class="row g-4">
                    <div class="col-lg-6">
                      <div class="smplfy-form-element"><div class="smplfy-form-element__label-row"><label class="smplfy-form-element__label">Mode of Sample Receipt</label></div><div class="smplfy-input-field smplfy-input-field--default smplfy-input-field--filled"><div class="smplfy-input-field__shell"><select class="smplfy-input-field__control smplfy-input-field__control--select"><option>Consumer Sample</option></select><span class="smplfy-input-field__icon" data-icon="down"></span></div></div></div>
                    </div>
                    <div class="col-lg-6">
                      <div class="smplfy-form-element"><div class="smplfy-form-element__label-row"><label class="smplfy-form-element__label">Tentative Reporting Date</label></div><div class="smplfy-input-field smplfy-input-field--date-field smplfy-input-field--default smplfy-input-field--empty"><div class="smplfy-input-field__shell smplfy-input-field__shell--date"><input class="smplfy-input-field__control smplfy-input-field__control--date-text" type="text" value="" placeholder="Select date" /><button class="btn smplfy-input-field__action smplfy-input-field__action--date" type="button"><span class="smplfy-input-field__calendar" data-icon="calendar"></span></button></div></div></div>
                    </div>
                    <div class="col-lg-6">
                      <div class="smplfy-form-element"><div class="smplfy-form-element__label-row"><label class="smplfy-form-element__label">Amount (Inc. of all taxes)</label></div><div class="smplfy-input-field smplfy-input-field--default smplfy-input-field--empty"><div class="smplfy-input-field__shell"><input class="smplfy-input-field__control" type="text" value="" placeholder="Total amounts" /></div></div></div>
                    </div>
                    <div class="col-lg-6">
                      <div class="smplfy-form-element"><div class="smplfy-form-element__label-row"><label class="smplfy-form-element__label">Received By</label></div><div class="smplfy-input-field smplfy-input-field--default smplfy-input-field--empty"><div class="smplfy-input-field__shell"><select class="smplfy-input-field__control smplfy-input-field__control--select"><option>Select a user</option></select><span class="smplfy-input-field__icon" data-icon="down"></span></div></div></div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="new-sample-card__footer">
                <a class="new-sample-cancel btn" href="./new-sample-product-details.html"><span class="appicon" data-icon="left"></span><span>Product Details</span></a>
                <a class="btn smplfy-primary-button smplfy-primary-button--has-left-icon" href="./sample-details-draft.html"><span class="smplfy-primary-button__icon" data-icon="save"></span><span class="smplfy-primary-button__label">Save Sample</span></a>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
  </html>
