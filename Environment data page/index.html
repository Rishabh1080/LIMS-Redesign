<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Environment Data</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Primary">
        <div class="sidebar__brand">
          <img class="sidebar__brand-mark" src="./logo-l.png" alt="Deepak ChemTech logo" />
          <div class="sidebar__brand-copy">
            <div class="sidebar__brand-name">Deepak Chemtach</div>
            <div class="sidebar__brand-sub">Pvt. Ltd.</div>
          </div>
        </div>

        <div class="sidebar__section">
          <div class="sidebar__section-label">HOME</div>
          <a class="sidebar__item" href="#">
            <span class="sidebar__item-icon" aria-hidden="true" data-tabler-icon="home-2"></span>
            <span>Dashboard</span>
          </a>
        </div>

        <div class="sidebar__section">
          <div class="sidebar__section-label">LIMS</div>
          <a class="sidebar__item" href="#">
            <span class="sidebar__item-icon" aria-hidden="true" data-tabler-icon="clipboard-list"></span>
            <span>Requests for me</span>
          </a>
          <a class="sidebar__item" href="#">
            <span class="sidebar__item-icon" aria-hidden="true" data-tabler-icon="clipboard-text"></span>
            <span>Test Requests</span>
          </a>
          <a class="sidebar__item" href="#">
            <span class="sidebar__item-icon" aria-hidden="true" data-tabler-icon="flask"></span>
            <span>Samples Workspace</span>
          </a>
          <a class="sidebar__item" href="#">
            <span class="sidebar__item-icon" aria-hidden="true" data-tabler-icon="layout-grid"></span>
            <span>All Samples</span>
          </a>
          <a class="sidebar__item is-active" href="#">
            <span class="sidebar__item-icon" aria-hidden="true" data-tabler-icon="cloud-data-connection"></span>
            <span>Environment Data</span>
          </a>
        </div>
      </aside>

      <div class="content-shell">
        <header class="app-topbar">
          <div class="app-topbar__breadcrumbs">
            <button class="topbar-icon-btn topbar-icon-btn--ghost" type="button" aria-label="Toggle navigation">
              <span aria-hidden="true" data-tabler-icon="menu-2"></span>
            </button>
            <button class="topbar-icon-btn topbar-icon-btn--ghost" type="button" aria-label="Go home">
              <span aria-hidden="true" data-tabler-icon="home-2"></span>
            </button>
            <span class="app-topbar__crumb-sep">›</span>
            <span>Environment Data</span>
          </div>

          <div class="app-topbar__actions">
            <div class="status-pill is-success">
              <span class="status-pill__dot" aria-hidden="true" data-tabler-icon="activity"></span>
              No Active Alerts
            </div>
            <div class="topbar-chip">+91-6358273804</div>
            <button class="topbar-icon-btn" type="button" aria-label="Notifications">
              <span aria-hidden="true" data-tabler-icon="bell"></span>
            </button>
            <div class="topbar-avatar">DC</div>
          </div>
        </header>

        <main class="page">
          <section class="page-header">
            <h1>Environment Data</h1>
            <button class="button button-primary" id="open-modal" type="button">
              <span class="button__icon" aria-hidden="true" data-tabler-icon="plus"></span>
              <span>Add Data Log</span>
            </button>
          </section>

          <div class="count-label" id="log-count">5 Logs</div>

          <section class="table-card" aria-label="Environment data logs">
            <div class="table-wrap">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>Recorded By</th>
                    <th>Recorded At</th>
                    <th>Temperature</th>
                    <th>Relative Humidity</th>
                    <th>Location</th>
                    <th class="col-actions">Actions</th>
                  </tr>
                </thead>
                <tbody id="log-body"></tbody>
              </table>
            </div>
          </section>
        </main>
      </div>
    </div>

    <div class="modal" id="log-modal" aria-hidden="true">
      <div class="modal__backdrop" data-close-modal></div>
      <div class="modal__card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal__header">
          <div class="modal__title-row">
            <span class="modal__title-icon" aria-hidden="true" data-tabler-icon="cloud-data-connection"></span>
            <h2 id="modal-title">Add Data Log</h2>
          </div>
          <button class="icon-btn" type="button" aria-label="Close modal" data-close-modal>
            <span aria-hidden="true" data-tabler-icon="x"></span>
          </button>
        </div>

        <form class="modal__body" id="log-form">
          <div class="field field--full">
            <label class="field__label" for="recordingDateTime">Recording date and time <span class="field__required">*</span></label>
            <input class="input" id="recordingDateTime" name="recordingDateTime" type="text" placeholder="06/03/2026, 10:13" autocomplete="off" />
            <div class="field__message" data-error-for="recordingDateTime"></div>
          </div>

          <div class="field-grid">
            <div class="field">
              <label class="field__label" for="temperature">Temperature</label>
              <input class="input" id="temperature" name="temperature" type="text" placeholder="24.3" autocomplete="off" inputmode="decimal" />
              <div class="field__message" data-error-for="temperature"></div>
            </div>

            <div class="field">
              <label class="field__label" for="relativeHumidity">Relative humidity</label>
              <input class="input" id="relativeHumidity" name="relativeHumidity" type="text" placeholder="48%" autocomplete="off" inputmode="decimal" />
              <div class="field__message" data-error-for="relativeHumidity"></div>
            </div>
          </div>

          <div class="field field--full">
            <label class="field__label" for="location">Location</label>
            <div class="select-wrap">
              <select class="select" id="location" name="location">
                <option value="">Select location</option>
                <option>Main Laboratory</option>
                <option>Humidity Chamber</option>
                <option>Sample Receiving Bay</option>
                <option>Instrument Room</option>
              </select>
              <span class="select-wrap__icon" aria-hidden="true">⌄</span>
            </div>
            <div class="field__message" data-error-for="location"></div>
          </div>
        </form>

        <div class="modal__actions">
          <button class="button button-secondary" type="button" data-close-modal>
            <span class="button__icon" aria-hidden="true" data-tabler-icon="x"></span>
            <span>Cancel</span>
          </button>
          <button class="button button-primary" type="submit" form="log-form">
            <span class="button__icon" aria-hidden="true" data-tabler-icon="device-floppy"></span>
            <span>Submit</span>
          </button>
        </div>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
